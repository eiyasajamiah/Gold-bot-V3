name: 🥇 Gold Bot v3.0 — يعمل 24/7

permissions:
  contents: write

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install
        run: pip install -r requirements.txt

      - name: 🔑 Build Config
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_API_KEY:   ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_PROVIDER:  ${{ secrets.CLAUDE_PROVIDER }}
        run: |
          cat > config.json << CFGEOF
          {
            "TELEGRAM_TOKEN":  "$TELEGRAM_TOKEN",
            "TELEGRAM_CHAT_ID": "$TELEGRAM_CHAT_ID",
            "CLAUDE_API_KEY":  "$CLAUDE_API_KEY",
            "CLAUDE_PROVIDER": "$CLAUDE_PROVIDER",
            "CLAUDE_MODEL":    "claude-sonnet-4-6",
            "SYMBOL": "GC=F",
            "DXY_SYMBOL": "DX-Y.NYB",
            "RUN_INTERVAL_MIN": 1,
            "DAILY_REPORT_HOUR_UTC": 20,
            "TG_MAX_RETRIES": 4,
            "TG_TIMEOUT": 20,
            "ATR_SL_MULT": 1.5,
            "ATR_TP_MULT": 3.0,
            "MIN_STRATEGY_SCORE": 4,
            "MIN_TF_AGREE": 2,
            "MIN_RR": 1.5,
            "SMC_MIN_SCORE": 4,
            "SMC_CANDLES": 100,
            "OB_IMPULSE_ATR_MULT": 1.5,
            "OB_IMPULSE_CANDLES": 3,
            "OB_MAX_AGE_BARS": 80,
            "OB_OVERLAP_MIN_PCT": 0.30,
            "OB_TOUCH_BUFFER_PCT": 0.002,
            "OB_SL_BUFFER_PCT": 0.001,
            "OB_MIN_RR": 1.8,
            "UNIFIED_MIN_AGREE": 2,
            "PERF_FILE": "performance.json",
            "TRIGGER_PRICE_CHANGE_PCT": 0.04,
            "TRIGGER_VOLUME_SPIKE_X": 1.8,
            "TRIGGER_NEW_CANDLE_5M": true,
            "TRIGGER_NEW_CANDLE_15M": true,
            "TRIGGER_FORCE_EVERY_MIN": 3
          }
          CFGEOF
          echo "✅ Config | Provider=$CLAUDE_PROVIDER | Key=${#CLAUDE_API_KEY} chars"

      - name: 💾 Restore State
        uses: actions/cache@v4
        with:
          path: |
            subscribers.json
            performance.json
            ob_signals.json
          key: bot-state-${{ github.run_number }}
          restore-keys: bot-state-

      - name: 📁 Directories
        run: mkdir -p charts logs

      - name: 🚀 Run Bot
        # timeout 330 = 5.5 دقيقة → يضمن 2 دورات تحليل على الأقل
        run: timeout 330 python unified_gold_bot.py || true
        env:
          PYTHONUNBUFFERED: "1"

      - name: 💾 Save State
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            subscribers.json
            performance.json
            ob_signals.json
          key: bot-state-${{ github.run_number }}

      - name: 🔄 Keep Alive
        if: github.event_name == 'schedule'
        run: |
          git config user.email "goldbot@github.com"
          git config user.name "Gold Bot"
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .last_run
          git add .last_run
          git diff --staged --quiet || git commit -m "⏱ keep-alive $(date -u '+%H:%M')"
          git push || true

      - name: 📋 Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gold-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
