name: 📊 Monitor — مراقبة صحة البوت

permissions:
  contents: read

on:
  schedule:
    - cron: '0 */6 * * *'   # كل 6 ساعات
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 فحص آخر تشغيل
        id: check
        run: |
          if [ -f ".last_run" ]; then
            LAST=$(cat .last_run)
            echo "last_run=$LAST" >> $GITHUB_OUTPUT
            echo "✅ آخر تشغيل: $LAST"
          else
            echo "last_run=لم يُسجَّل بعد" >> $GITHUB_OUTPUT
            echo "⚠️ لا يوجد سجل تشغيل"
          fi

      - name: 📢 تقرير صحة لتيليغرام
        env:
          TG_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT:   ${{ secrets.TELEGRAM_CHAT_ID }}
          LAST_RUN:  ${{ steps.check.outputs.last_run }}
        run: |
          MSG="📊 <b>تقرير صحة البوت</b>%0A"
          MSG+="━━━━━━━━━━━━━━━━%0A"
          MSG+="✅ البوت يعمل بشكل طبيعي%0A"
          MSG+="⏰ آخر تشغيل: ${LAST_RUN}%0A"
          MSG+="🔄 يتجدد كل 5 دقائق تلقائياً%0A"
          MSG+="📅 الآن: $(date -u '+%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=${MSG}" \
            -d "parse_mode=HTML" || true
