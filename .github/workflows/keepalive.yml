name: ♾️ Keep Alive — منع التوقف التلقائي

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 12 */20 * *'   # كل 20 يوم
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Re-enable Workflows
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const wf of workflows.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                await github.rest.actions.enableWorkflow({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: wf.id,
                });
                console.log('✅ Re-enabled: ' + wf.name);
              } else {
                console.log('✅ Active: ' + wf.name);
              }
            }

      - name: 📝 Update keepalive file
        run: |
          git config user.email "goldbot@github.com"
          git config user.name "Gold Bot KeepAlive"
          echo "Last keep-alive: $(date -u)" > .keepalive
          git add .keepalive
          git commit -m "♾️ keep-alive $(date -u '+%Y-%m-%d')" || true
          git push || true

      - name: 📢 إشعار تيليغرام
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=♾️ <b>تجديد تلقائي ناجح</b>%0A✅ بوت الذهب تم تجديد نشاطه%0A📅 $(date -u '+%Y-%m-%d %H:%M UTC')" \
            -d "parse_mode=HTML" || true
