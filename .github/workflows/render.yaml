services:
  - type: web
    name: gold-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python unified_gold_bot.py
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: CLAUDE_PROVIDER
        value: auto
      - key: PYTHON_VERSION
        value: 3.11.0
